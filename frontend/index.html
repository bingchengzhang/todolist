<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0e1a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Todo</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <canvas id="particles"></canvas>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>

  <!-- ── Auth overlay ─────────────────────────────── -->
  <div id="auth-overlay" class="auth-overlay">
    <div class="auth-card">
      <h1 class="auth-logo">✦ 任务</h1>
      <div class="auth-tabs">
        <button class="auth-tab active" id="tab-login">登录</button>
        <button class="auth-tab" id="tab-register">注册</button>
      </div>
      <p id="auth-error" class="auth-error hidden"></p>
      <input id="auth-username" type="text" placeholder="用户名" autocomplete="username" maxlength="20" />
      <input id="auth-password" type="password" placeholder="密码（至少 6 位）" autocomplete="current-password" />
      <button id="auth-submit" class="auth-submit">登录</button>
    </div>
  </div>

  <!-- ── Main app ──────────────────────────────────── -->
  <div id="app" class="hidden">

    <header class="header">
      <div class="header-inner">
        <h1 class="header-title">任务</h1>
        <div class="header-right">
          <span id="username-display" class="username-display"></span>
          <button id="logout-btn" class="icon-btn" title="退出登录">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
              <polyline points="16 17 21 12 16 7"/>
              <line x1="21" y1="12" x2="9" y2="12"/>
            </svg>
          </button>
        </div>
      </div>
    </header>

    <main class="main">

      <!-- Stats cards -->
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-num" id="stat-total">0</div>
          <div class="stat-lbl">全部任务</div>
        </div>
        <div class="stat-card">
          <div class="stat-num stat-warn" id="stat-today">0</div>
          <div class="stat-lbl">今日到期</div>
        </div>
        <div class="stat-card">
          <div class="stat-num stat-ok" id="stat-done">0</div>
          <div class="stat-lbl">已完成</div>
        </div>
        <div class="stat-card">
          <div class="stat-num stat-err" id="stat-overdue">0</div>
          <div class="stat-lbl">已逾期</div>
        </div>
      </div>

      <!-- Input card -->
      <div class="input-card" id="input-card">
        <div class="input-main-row">
          <input id="todo-input" type="text" placeholder="输入任务，AI 自动分类…" maxlength="200" autocomplete="off" />
          <button id="add-btn" aria-label="添加">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round">
              <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
            </svg>
          </button>
        </div>
        <div class="input-options">
          <div class="tags-row" id="cat-tags">
            <button class="itag itag-auto active" data-value="">自动</button>
            <button class="itag itag-cat" data-value="工作" data-cat="工作">工作</button>
            <button class="itag itag-cat" data-value="学习" data-cat="学习">学习</button>
            <button class="itag itag-cat" data-value="生活" data-cat="生活">生活</button>
            <button class="itag itag-cat" data-value="其他" data-cat="其他">其他</button>
          </div>
          <div class="tags-row" id="pri-tags">
            <button class="itag itag-pri pri-高" data-value="高">高</button>
            <button class="itag itag-pri pri-中 active" data-value="中">中</button>
            <button class="itag itag-pri pri-低" data-value="低">低</button>
          </div>
          <div class="deadline-row">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="dl-icon">
              <rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
            </svg>
            <input id="deadline-input" type="datetime-local" />
            <button id="clear-deadline" class="clear-dl hidden">×</button>
          </div>
        </div>
        <p id="input-error" class="input-error hidden"></p>
      </div>

      <!-- Active tasks grouped by category -->
      <div id="task-groups"></div>

      <!-- Completed section -->
      <div class="done-section">
        <button class="done-toggle" id="done-toggle" aria-expanded="false">
          <svg class="chevron" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="6 9 12 15 18 9"/>
          </svg>
          <span>已完成</span>
          <span class="done-badge" id="done-count">0</span>
        </button>
        <ul id="done-list" class="task-list collapsed"></ul>
      </div>

      <!-- Heatmap -->
      <div class="heatmap-section">
        <div class="heatmap-header">
          <span class="heatmap-title">完成热力图</span>
          <span class="heatmap-sub">近 12 周</span>
        </div>
        <div class="heatmap-wrap">
          <div class="heatmap-days">
            <span></span><span>一</span><span></span>
            <span>三</span><span></span><span>五</span><span></span>
          </div>
          <div id="heatmap"></div>
        </div>
      </div>

    </main>
  </div>

  <script src="main.js"></script>
</body>
</html>
