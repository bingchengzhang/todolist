<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#070810" />
  <title>任务 | AI Todo</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <canvas id="particles"></canvas>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>

  <!-- ── Auth Overlay ─────────────────────────────── -->
  <div id="auth-overlay" class="auth-overlay">
    <div class="auth-card">
      <h1 class="auth-logo">✦ 任务</h1>
      <div class="auth-tabs">
        <button class="auth-tab active" id="tab-login">登录</button>
        <button class="auth-tab" id="tab-register">注册</button>
      </div>
      <p id="auth-error" class="auth-error hidden"></p>
      <input id="auth-username" type="text" placeholder="用户名" autocomplete="username" />
      <input id="auth-password" type="password" placeholder="密码" autocomplete="current-password" />
      <button id="auth-submit" class="auth-submit">进入空间</button>
    </div>
  </div>

  <!-- ── Main App ─────────────────────────────────── -->
  <div id="app" class="hidden">

    <header class="header">
      <div class="header-inner">
        <span class="header-title">✦ 任务</span>
        <div class="header-right">
          <span id="username-display" class="username-display"></span>
          <button id="logout-btn" class="icon-btn" title="登出">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
            </svg>
          </button>
        </div>
      </div>
    </header>

    <main class="main">

      <section class="hero">
        <h1 class="hero-title">你好。</h1>
        <p class="hero-subtitle">今天有哪些计划？</p>
      </section>

      <!-- Stats -->
      <section class="stats-row">
        <div class="stat-pill active" data-filter="all">
          <div class="stat-num" id="stat-total">0</div>
          <div class="stat-lbl">全部</div>
        </div>
        <div class="stat-pill" data-filter="today">
          <div class="stat-num" id="stat-today">0</div>
          <div class="stat-lbl">今日</div>
        </div>
        <div class="stat-pill" data-filter="done">
          <div class="stat-num" id="stat-done">0</div>
          <div class="stat-lbl">已完成</div>
        </div>
        <div class="stat-pill" data-filter="overdue">
          <div class="stat-num" id="stat-overdue">0</div>
          <div class="stat-lbl">逾期</div>
        </div>
      </section>

      <!-- Input Card -->
      <section class="input-card">
        <div class="input-main-row">
          <input id="todo-input" type="text" placeholder="记录新任务..." maxlength="200" autocomplete="off" />
          <button id="add-btn" aria-label="添加任务">
            <svg id="add-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
              <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
            </svg>
            <div id="ai-loader" class="ai-loading hidden"></div>
          </button>
        </div>
        
        <div class="input-options">
          <div class="tags-group">
            <span class="tags-label">分类</span>
            <div class="tags-row" id="cat-tags">
              <button class="itag active" data-value="">自动</button>
              <button class="itag" data-value="工作">工作</button>
              <button class="itag" data-value="学习">学习</button>
              <button class="itag" data-value="生活">生活</button>
            </div>
          </div>
          <div class="tags-group">
            <span class="tags-label">优先级</span>
            <div class="tags-row" id="pri-tags">
              <button class="itag pri-高" data-value="高">高</button>
              <button class="itag pri-中 active" data-value="中">中</button>
              <button class="itag pri-低" data-value="低">低</button>
            </div>
          </div>
          <div class="tags-group">
            <span class="tags-label">截止日期</span>
            <div class="deadline-picker">
              <svg class="dl-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
              </svg>
              <input id="deadline-input" type="datetime-local" />
            </div>
          </div>
        </div>
        <p id="input-error" class="auth-error hidden"></p>
      </section>

      <!-- Active Tasks -->
      <div id="task-groups">
        <!-- Groups will be injected here -->
      </div>

      <!-- Completed Tasks -->
      <section class="done-section">
        <button class="done-toggle" id="done-toggle" aria-expanded="false">
          <svg class="chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="6 9 12 15 18 9"/>
          </svg>
          <span>查看已完成</span>
          <span class="done-badge" id="done-count">0</span>
        </button>
        <ul id="done-list" class="task-list collapsed"></ul>
      </section>

    </main>
  </div>

  <script src="main.js"></script>
</body>
</html>
