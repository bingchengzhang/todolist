<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Todo Dashboard</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="gradient-sphere"></div>

  <!-- ── Auth Overlay ─────────────────────────────── -->
  <div id="auth-overlay" class="auth-overlay">
    <div class="auth-card">
      <h2 style="margin-bottom: 2rem;">✦ 进入空间</h2>
      <div id="auth-tabs" style="display: flex; gap: 1rem; margin-bottom: 1.5rem;">
        <button id="tab-login" style="flex:1; background:none; border:none; color:#fff; cursor:pointer; font-weight:600; border-bottom: 2px solid var(--accent);">登录</button>
        <button id="tab-register" style="flex:1; background:none; border:none; color:var(--text-dim); cursor:pointer;">注册</button>
      </div>
      <input id="auth-username" type="text" placeholder="用户名" />
      <input id="auth-password" type="password" placeholder="密码" />
      <button id="auth-submit" class="auth-btn">开启计划</button>
    </div>
  </div>

  <!-- ── Main App ─────────────────────────────────── -->
  <div id="app" class="hidden">
    <div class="main-container">
      
      <!-- Sidebar -->
      <aside class="sidebar">
        <div class="greeting-area">
          <h1 id="greeting-text">你好，<span id="username-display"></span></h1>
          <p>今天是探索新可能的完美时刻。</p>
        </div>

        <div class="stat-group">
          <div class="stat-item active" data-filter="all">
            <span class="stat-val" id="stat-total">0</span>
            <span class="stat-label">全部任务</span>
          </div>
          <div class="stat-item" data-filter="today">
            <span class="stat-val" id="stat-today">0</span>
            <span class="stat-label">今日到期</span>
          </div>
          <div class="stat-item" data-filter="done">
            <span class="stat-val" id="stat-done">0</span>
            <span class="stat-label">已完成</span>
          </div>
          <div class="stat-item" data-filter="overdue">
            <span class="stat-val" id="stat-overdue">0</span>
            <span class="stat-label">逾期未毕</span>
          </div>
        </div>

        <button id="logout-btn" style="margin-top: 3rem; background:none; border:none; color:var(--text-dim); cursor:pointer; font-size:0.8rem;">登出系统</button>
      </aside>

      <!-- Content Area -->
      <main class="content-area">
        
        <!-- Command Bar -->
        <section>
          <div class="command-bar">
            <input id="todo-input" type="text" placeholder="键入新任务，回车即存..." />
            <button id="add-btn">添加</button>
          </div>
          <div class="input-options">
            <div id="cat-tags" style="display: flex; gap: 0.5rem;">
              <div class="itag active" data-value="">自动分类</div>
              <div class="itag" data-value="工作">工作</div>
              <div class="itag" data-value="学习">学习</div>
              <div class="itag" data-value="生活">生活</div>
            </div>
            <div id="pri-tags" style="display: flex; gap: 0.5rem; margin-left: 1.5rem;">
              <div class="itag" data-value="高">高</div>
              <div class="itag active" data-value="中">中</div>
              <div class="itag" data-value="低">低</div>
            </div>
            <input id="deadline-input" type="datetime-local" style="margin-left:auto; background:none; border:none; color:var(--text-dim); font-size:0.7rem;" />
          </div>
        </section>

        <!-- Task Groups -->
        <div id="task-groups" class="task-section">
          <!-- Tasks injected here -->
        </div>

      </main>
    </div>
  </div>

  <script src="main.js"></script>
</body>
</html>
