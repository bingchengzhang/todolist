<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#080714" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Todo" />
  <title>Todo</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Ambient background orbs -->
  <div class="bg-orb bg-orb-1"></div>
  <div class="bg-orb bg-orb-2"></div>
  <div class="bg-orb bg-orb-3"></div>

  <!-- Header -->
  <header class="header">
    <div class="header-inner">
      <h1 class="header-title">任务</h1>
      <span class="header-count" id="header-count">0 项</span>
    </div>
  </header>

  <!-- Input bar -->
  <div class="input-wrap">
    <div class="input-card">
      <input id="todo-input" type="text" placeholder="添加新任务…" maxlength="200" autocomplete="off" />
      <button id="add-btn" aria-label="添加">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round">
          <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
        </svg>
      </button>
    </div>
    <p id="input-error" class="input-error hidden"></p>
  </div>

  <!-- Active todos -->
  <section class="section">
    <ul id="todo-list" class="card-list"></ul>
    <p id="empty-hint" class="empty-hint hidden">暂无任务 — 在上方添加一个吧</p>
  </section>

  <!-- Completed todos -->
  <section class="section" id="done-section">
    <button class="section-toggle" id="done-toggle" aria-expanded="false">
      <span class="section-toggle-label">已完成</span>
      <span class="section-toggle-count" id="done-count">0</span>
      <svg class="chevron" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="6 9 12 15 18 9"/>
      </svg>
    </button>
    <ul id="done-list" class="card-list collapsed"></ul>
  </section>

  <script src="main.js"></script>
</body>
</html>
