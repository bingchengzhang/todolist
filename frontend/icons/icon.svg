<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d0b22"/>
      <stop offset="100%" stop-color="#1e0942"/>
    </linearGradient>
    <radialGradient id="orb" cx="50%" cy="44%" r="56%">
      <stop offset="0%" stop-color="#4f46e5" stop-opacity="0.55"/>
      <stop offset="60%" stop-color="#7c3aed" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="card-fill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.09"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.04"/>
    </linearGradient>
    <filter id="glow-ck">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- Ambient glow -->
  <ellipse cx="256" cy="230" rx="260" ry="220" fill="url(#orb)"/>

  <!-- Glass card -->
  <rect x="88" y="88" width="336" height="336" rx="72"
        fill="url(#card-fill)"
        stroke="rgba(255,255,255,0.14)"
        stroke-width="1.5"/>

  <!-- Checkmark -->
  <polyline
    points="144,258 214,328 368,174"
    fill="none"
    stroke="white"
    stroke-width="36"
    stroke-linecap="round"
    stroke-linejoin="round"
    filter="url(#glow-ck)"
    opacity="0.95"/>
</svg>
